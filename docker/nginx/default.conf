server {
    listen 80;
    server_name adelabartunkova.cz www.adelabartunkova.cz;
    root /var/www/html/www;
    index index.php;

    client_max_body_size 50M;

    # Static assets served directly with caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|map)$ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public";
    }

    # All requests: try the file, then fall back to index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_read_timeout 60;
    }
}
