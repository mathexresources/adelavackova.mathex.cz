services:
  nginx:
    image: nginx:alpine
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build: .
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    environment:
      DB_HOST: mariadb
      DB_USER: ${DB_USER:-adaPortfolio}
      DB_PASS: ${DB_PASS:-adaPortfolio}
      DB_NAME: ${DB_NAME:-adaPortfolio}
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-secret}
      MYSQL_DATABASE: ${DB_NAME:-adaPortfolio}
      MYSQL_USER: ${DB_USER:-adaPortfolio}
      MYSQL_PASSWORD: ${DB_PASS:-adaPortfolio}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./sql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    restart: unless-stopped

volumes:
  mariadb_data:
  vendor:
